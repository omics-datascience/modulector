services:
    # PostgreSQL (empty DB)
    db_modulector:
        image: postgres:18-alpine
        restart: always
        # Uncomment this to add your custom config
        # command: postgres -c 'config_file=/etc/postgresql/postgresql.conf'
        environment:
            # IMPORTANT: these three params must be the same as POSTGRES_USERNAME, POSTGRES_PASSWORD, POSTGRES_DB
            # below in 'web' service respectively
            POSTGRES_USER: "modulector"
            POSTGRES_PASSWORD: "modulector"
            POSTGRES_DB: "modulector"
        volumes:
            - postgres_data:/var/lib/postgresql/data/
            # Uncomment this to add your custom config
            # - ./config/postgres/postgres.conf:/etc/postgresql/postgresql.conf

    # Django Proxy Server
    nginx_modulector:
        image: nginx:1.31
        restart: always
        ports:
            - "80:8000"
        volumes:
            - ./config/nginx/conf.d:/etc/nginx/conf.d
            - static_data:/static:ro
        depends_on:
            - web_modulector
            - mcp_modulector

    # Django Backend Server
    web_modulector:
        image: omicsdatascience/modulector:2.5.0
        restart: always
        depends_on:
            - db_modulector
        volumes:
            - static_data:/src/static
        environment:
            # Django
            DJANGO_SETTINGS_MODULE: "ModulectorBackend.settings_prod"
            POSTGRES_HOST: "db_modulector" # Name of the modulector DB service previously defined

            # CSRF. Django 4.x need this.
            # Hosts separated by comma ('http://', 'https://' prefixes are mandatory)
            # Example: CSRF_TRUSTED_ORIGINS: 'http://127.0.0.1', 'http://127.0.0.1,https://127.0.0.1:8000', etc
            CSRF_TRUSTED_ORIGINS: "https://modulector.multiomix.org,https://www.modulector.multiomix.org,http://modulector.multiomix.org,http://www.modulector.multiomix.org"

            # Allowed host must include the ones set in the NGINX modulector.conf file. Localhost is included for
            # health-checks
            ALLOWED_HOSTS: "web,web_modulector,127.0.0.1,localhost"

    # MCP Server
    mcp_modulector:
        image: omicsdatascience/modulector:2.5.0
        restart: always
        depends_on:
            - web_modulector
        command:
            - python3
            - -m
            - modulector_sdk.mcp_server
            - --transport
            - streamable-http
            - --host
            - 0.0.0.0
            - --port
            - "8001"
        environment:
            PYTHONPATH: "/src/sdk/src"
            MODULECTOR_API_BASE_URL: "https://modulector.multiomix.org"
            MODULECTOR_PUBLIC_BASE_URL: "https://modulector.multiomix.org"
            MODULECTOR_MCP_ALLOWED_HOSTS: "modulector.multiomix.org,www.modulector.multiomix.org"
            MODULECTOR_MCP_ALLOWED_ORIGINS: "https://modulector.multiomix.org,https://www.modulector.multiomix.org"

volumes:
    postgres_data:
        external: true
        name: "modulector_postgres_data"
    static_data:
        external: true
        name: "modulector_static_data"
